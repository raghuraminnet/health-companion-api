# Health Companion API - Hostinger Docker Deployment
# Use with Hostinger DockerManager "Compose Manually" feature

version: '3.8'

services:
  # Backend API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: health-companion-api
    restart: unless-stopped
    ports:
      - "38257:38257"
    environment:
      - NODE_ENV=production
      - PORT=38257
      - PG_HOST=${PG_HOST}
      - PG_PORT=${PG_PORT}
      - PG_USER=${PG_USER}
      - PG_PASSWORD=${PG_PASSWORD}
      - PG_DATABASE=${PG_DATABASE}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    networks:
      - health-network
 healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:38257/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  health-network:
    driver: bridge